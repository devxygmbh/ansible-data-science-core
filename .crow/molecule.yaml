when:
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: [manual, cron, pull_request]

matrix:
  include:
    - SCENARIO: r_default
      WHEN: 'roles/r/**'

    - SCENARIO: quarto_default
      WHEN: 'roles/quarto/**'
    - SCENARIO: quarto_mixed_version_order
      WHEN: 'roles/quarto/**'

    - SCENARIO: python_default
      WHEN: 'roles/python/**'
    # - r_install_source

steps:
  - name: 'Test ${SCENARIO}'
    image: library/docker:28-dind
    privileged: true
    environment:
      # force output of ANSI colors
      PY_COLORS: 1
      DOCKER_HOST: tcp://docker:2375
      ANSIBLE_ROLES_PATH: ./roles
    commands:
      - apk add -q --no-cache python3 python3-dev py3-pip gcc git curl build-base autoconf automake py3-cryptography linux-headers musl-dev libffi-dev openssl-dev openssh yaml-dev ca-certificates
      - python3 --version
      - python3 -m venv ~/venv/ansible-molecule
      - source ~/venv/ansible-molecule/bin/activate
      # ansible-core<2.17 for compat with rhel8
      - python3 -m pip install -q ansible-doctor "ansible-core<2.17" molecule-plugins[docker] cryptography
      - ansible --version
      - molecule --version
      - cd extensions
      - molecule test --scenario-name ${SCENARIO}
    when:
      - path: ${WHEN}

services:
  docker:
    environment:
      DOCKER_TLS_CERTDIR: ''
    image: docker:28-dind
    commands: dockerd --tls=false --host=tcp://0.0.0.0:2375
    privileged: true
    ports:
      - 2375
    when:
      - path: ${WHEN}
