when:
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: [manual, cron, pull_request]

matrix:
  include:
    - SCENARIO: r_default
      WHEN: 'roles/r/**'

    - SCENARIO: quarto_default
      WHEN: 'roles/quarto/**'
    - SCENARIO: quarto_mixed_version_order
      WHEN: 'roles/quarto/**'

    - SCENARIO: python_default
      WHEN: 'roles/python/**'
    # - r_install_source

steps:
  - name: 'Test ${SCENARIO}'
    image: cr.codefloe.com/docker.io/library/docker:29-dind
    privileged: true
    environment:
      # force output of ANSI colors
      PY_COLORS: 1
      DOCKER_HOST: tcp://docker:2375
      ANSIBLE_ROLES_PATH: ./roles
      # renovate: datasource=github-releases depName=astral-sh/uv
      UV_VERSION: 0.11.31
    commands:
      - apk add -q --no-cache python3 git curl ca-certificates
      # The Alpine base ships Python 3.14, but ansible-compat refuses any
      # Python >= 3.14 with ansible-core < 2.20, and we must stay on
      # ansible-core<2.17 for rhel8 compat. Pin the control-node interpreter to
      # 3.12 via uv (same as `just init-venv`) instead of relaxing that pin.
      - curl -LsSf https://astral.sh/uv/${UV_VERSION}/install.sh | sh
      - export PATH="$HOME/.local/bin:$PATH"
      - uv venv --python 3.12 ~/venv/ansible-molecule
      - source ~/venv/ansible-molecule/bin/activate
      - python3 --version
      # ansible-core<2.17 for compat with rhel8
      - uv pip install -q ansible-doctor "ansible-core<2.17" molecule-plugins[docker] cryptography
      - ansible --version
      - molecule --version
      - cd extensions
      - molecule test --scenario-name ${SCENARIO}
    when:
      - path: ${WHEN}

services:
  docker:
    environment:
      DOCKER_TLS_CERTDIR: ''
    image: cr.codefloe.com/docker.io/library/docker:29-dind
    commands: dockerd --tls=false --host=tcp://0.0.0.0:2375
    privileged: true
    ports:
      - 2375
    when:
      - path: ${WHEN}
