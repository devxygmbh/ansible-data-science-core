# @var quarto_versions:type: list
quarto_versions:
  - release
  # - pre-release
  # - 1.2.232

# @var quarto_installation_dir:type: string
# @var quarto_installation_dir:description: The directory in which to install Quarto
quarto_installation_dir: /opt/quarto

# @var quarto_add_to_path:type: boolean
# @var quarto_add_to_path:description: Whether to add the executables to $PATH (bash and fish)
quarto_add_to_path: true
# ---

### Optional vars

# @var quarto_custom_download_url:type: string
# @var quarto_custom_download_url:description: URL for local download. Cannot be combined with dynamic release IDs like 'release'. The tarballs must be named as: `quarto-{{ version }}-linux-{{ arch }}.tar.gz`.
# quarto_custom_download_url:

# @var quarto_local_tarball_path:type: string
# @var quarto_local_tarball_path:description: Local path to Quarto tarballs. The tarballs must be named as: `quarto-{{ version }}-linux-{{ arch }}.tar.gz`.
# quarto_local_tarball_path:

### Artifactory configuration
# @var dsc_artifactory_enabled:description: Enable downloading assets from Artifactory instead of public sources
# @var dsc_artifactory_enabled:type: boolean
dsc_artifactory_enabled: false

# @var dsc_artifactory_base_url:description: Base URL for Artifactory instance (e.g., https://artifactory.example.com/artifactory)
# @var dsc_artifactory_base_url:type: string
# dsc_artifactory_base_url:

# @var dsc_artifactory_username:description: Username for Artifactory authentication
# @var dsc_artifactory_username:type: string
# dsc_artifactory_username:

# @var dsc_artifactory_password:description: Password for Artifactory authentication (use vault for production)
# @var dsc_artifactory_password:type: string
# dsc_artifactory_password:

# @var dsc_artifactory_quarto_repo:description: Repository path for Quarto packages in Artifactory
# @var dsc_artifactory_quarto_repo:type: string
# dsc_artifactory_quarto_repo: quarto-releases

# @var dsc_artifactory_timeout:description: Timeout in seconds for Artifactory downloads
# @var dsc_artifactory_timeout:type: integer
dsc_artifactory_timeout: 300
