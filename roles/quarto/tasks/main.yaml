- name: Store custom quarto versions in extra variable
  ansible.builtin.set_fact:
    custom_quarto_versions: "{{ quarto_versions | reject('search', 'release') | reject('search', 'prerelease') | list }}"

# quarto.org serves the release metadata as static JSON (the same endpoint the
# official Quarto install scripts use). Unlike the GitHub API it is not rate
# limited, which otherwise breaks runs from shared/NAT'd IPs.
- name: Get Quarto latest release
  when: quarto_custom_download_url is not defined and ('release' in quarto_versions)
  ansible.builtin.uri:
    url: '{{ quarto_release_metadata_url }}'
    return_content: true
  register: latest_release
  check_mode: false

- name: Infer latest release Quarto version
  when: quarto_custom_download_url is not defined and ('release' in quarto_versions)
  ansible.builtin.set_fact:
    quarto_release_version: "{{ latest_release.json.version | replace('v', '') }}"

- name: Get Quarto latest pre-release
  when: quarto_custom_download_url is not defined and ('pre-release' in quarto_versions)
  ansible.builtin.uri:
    url: '{{ quarto_prerelease_metadata_url }}'
    return_content: true
  register: latest_prerelease
  check_mode: false

- name: Infer latest pre-release Quarto version
  when: quarto_custom_download_url is not defined and ('pre-release' in quarto_versions)
  ansible.builtin.set_fact:
    quarto_prerelease_version: "{{ latest_prerelease.json.version | replace('v', '') }}"

- name: Combine quarto versions into a list (release + pre-release)
  when: quarto_custom_download_url is not defined and ('pre-release' in quarto_versions) and ('release' in quarto_versions) and quarto_release_version is defined and quarto_prerelease_version is defined
  ansible.builtin.set_fact:
    quarto_versions: '{{ [quarto_release_version, quarto_prerelease_version] + (custom_quarto_versions | default([])) }}'

- name: Combine quarto versions into a list (release + custom)
  when: quarto_custom_download_url is not defined and ('release' in quarto_versions) and quarto_release_version is defined
  ansible.builtin.set_fact:
    quarto_versions: '{{ [quarto_release_version] + (custom_quarto_versions | default([])) }}'

- name: Define environment facts
  ansible.builtin.set_fact:
    arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

- name: Download quarto binary from Artifactory
  when:
    - dsc_artifactory_enabled | default(false)
    - quarto_local_tarball_path is not defined
  ansible.builtin.get_url:
    url: '{{ dsc_artifactory_base_url }}/{{ dsc_artifactory_quarto_repo }}/v{{ item }}/quarto-{{ item }}-linux-{{ arch }}.tar.gz'
    dest: '/tmp/quarto-{{ item }}.tar.gz'
    url_username: '{{ dsc_artifactory_username }}'
    url_password: '{{ dsc_artifactory_password }}'
    force_basic_auth: true
    timeout: '{{ dsc_artifactory_timeout }}'
    mode: '0644'
  loop: '{{ quarto_versions }}'

- name: Download quarto binary (GitHub)
  when:
    - not (dsc_artifactory_enabled | default(false))
    - quarto_custom_download_url is not defined
    - quarto_local_tarball_path is not defined
  ansible.builtin.get_url:
    url: 'https://github.com/quarto-dev/quarto-cli/releases/download/v{{ item }}/quarto-{{ item }}-linux-{{ arch }}.tar.gz'
    dest: '/tmp/quarto-{{ item }}.tar.gz'
    mode: '0644'
  loop: '{{ quarto_versions }}'

- name: Download quarto binary (Custom URL)
  when:
    - not (dsc_artifactory_enabled | default(false))
    - quarto_custom_download_url is defined
    - quarto_local_tarball_path is not defined
  ansible.builtin.get_url:
    url: '{{ quarto_custom_download_url }}/quarto-{{ item }}-linux-{{ arch }}.tar.gz'
    dest: '/tmp/quarto-{{ item }}.tar.gz'
    mode: '0644'
  loop: '{{ quarto_versions }}'

- name: Copy local tarballs to /tmp
  when: quarto_local_tarball_path is defined
  ansible.builtin.copy:
    src: 'quarto-{{ item }}-linux-{{ arch }}.tar.gz'
    dest: '/tmp/quarto-{{ item }}.tar.gz'
    remote_src: true
    mode: '0755'
  loop: '{{ quarto_versions }}'

- name: Ensure quarto directory exists
  ansible.builtin.file:
    path: '{{ quarto_installation_dir }}'
    state: directory
    mode: '0755'

- name: Extract quarto binary
  ansible.builtin.unarchive:
    src: '/tmp/quarto-{{ item }}.tar.gz'
    dest: '{{ quarto_installation_dir }}'
    remote_src: true
  loop: '{{ quarto_versions }}'
  when: not ansible_check_mode

- name: Cleanup downloaded assets
  ansible.builtin.file:
    path: '/tmp/quarto-{{ item }}.tar.gz'
    state: absent
  changed_when: false
  loop: '{{ quarto_versions }}'

- name: Add quarto to PATH (bash)
  when: quarto_add_to_path | bool
  ansible.builtin.copy:
    dest: /etc/profile.d/quarto.sh
    mode: '0755'
    content: |
      {% set version_list = [] %}
      {% for version in quarto_versions %}
      {% set version_parts = version.split('.') %}
      {% set _ = version_list.append([version, version_parts | map('int') | list]) %}
      {% endfor %}
      {% set sorted_versions = version_list | sort(attribute=1, reverse=True) | map(attribute=0) | list %}
      {% set path_additions = [] %}
      {% for version in sorted_versions %}
      {% set _ = path_additions.append(quarto_installation_dir + '/quarto-' + version + '/bin') %}
      {% endfor %}
      export PATH={{ path_additions | join(':') }}:$PATH

- name: Ensure fish config directory exists
  when: quarto_add_to_path | bool
  ansible.builtin.file:
    path: /etc/fish/conf.d
    state: directory
    mode: '0755'

- name: Add quarto to PATH (fish)
  when: quarto_add_to_path | bool
  ansible.builtin.copy:
    dest: /etc/fish/conf.d/quarto.fish
    mode: '0755'
    content: |
      {% set version_list = [] %}
      {% for version in quarto_versions %}
      {% set version_parts = version.split('.') %}
      {% set _ = version_list.append([version, version_parts | map('int') | list]) %}
      {% endfor %}
      {% set sorted_versions = version_list | sort(attribute=1, reverse=True) | map(attribute=0) | list %}
      fish_add_path{% for version in sorted_versions %} '{{ quarto_installation_dir }}/quarto-{{ version }}/bin'{% endfor %}

- name: Use Quarto from new $PATH
  ansible.builtin.shell: |
    source /etc/profile.d/quarto.sh
