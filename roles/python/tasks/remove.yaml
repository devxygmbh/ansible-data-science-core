- name: Remove mode - Build list of wanted version patterns
  ansible.builtin.set_fact:
    wanted_version_patterns: "{{ python_interpreter_versions | map('string') | list }}"

- name: Remove mode - Identify cpython directories to remove
  ansible.builtin.set_fact:
    cpython_dirs_to_remove: >-
      {{ existing_cpython_dirs.files | default([])
      | rejectattr('path', 'search', '(' + wanted_version_patterns | join('|') + ')')
      | list }}

- name: Remove mode - Identify version symlinks to remove
  ansible.builtin.set_fact:
    version_symlinks_to_remove: >-
      {{ existing_version_symlinks.files | default([])
      | rejectattr('path', 'search', '/(' + wanted_version_patterns | join('|') + ')$')
      | list }}

- name: Remove mode - Display items to remove
  ansible.builtin.debug:
    msg:
      - 'Wanted versions: {{ wanted_version_patterns }}'
      - "cpython dirs to remove: {{ cpython_dirs_to_remove | map(attribute='path') | list }}"
      - "Version symlinks to remove: {{ version_symlinks_to_remove | map(attribute='path') | list }}"

- name: Remove mode - Remove unwanted cpython directories
  when: cpython_dirs_to_remove | length > 0
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: absent
  loop: '{{ cpython_dirs_to_remove }}'
  loop_control:
    label: '{{ item.path }}'

- name: Remove mode - Remove orphaned version symlinks
  when: version_symlinks_to_remove | length > 0
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: absent
  loop: '{{ version_symlinks_to_remove }}'
  loop_control:
    label: '{{ item.path }}'
