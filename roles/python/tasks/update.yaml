- name: "'Update mode': Query latest python release for respective minor versions from conda"
  block:
    - name: "'Update mode': Print Installed Python versions"
      ansible.builtin.debug:
        msg: '{{ python_version_list }}'

    - name: "'Update mode': Get list of installed Python directories"
      ansible.builtin.find:
        paths: /opt/python
        file_type: directory
        excludes: miniconda
      register: python_dirs
    - name: "'Update mode': Get latest available Python versions using conda search"
      ansible.builtin.command: '/opt/python/miniconda/bin/conda search --json python={{ item }}'
      register: conda_search_results
      loop: '{{ python_interpreter_versions }}'
      changed_when: false

    - name: "'Update mode': Store latest Python version for each Python version in a dictionary"
      ansible.builtin.set_fact:
        latest_python_interpreter_versions: "{{ latest_python_interpreter_versions | default({}) | combine({item.item: (item.stdout | from_json)['python'] | map(attribute='version') | list | community.general.version_sort | last}) }}"
      loop: '{{ conda_search_results.results }}'
      # output is too verbose
      no_log: true

    - name: "'Update mode': Print latest available Python conda versions"
      ansible.builtin.debug:
        var: latest_python_interpreter_versions

- name: "'Update mode': Compare dictionary and list and keep keys of non-matching rows"
  ansible.builtin.set_fact:
    python_interpreter_versions: "{{ latest_python_interpreter_versions | dict2items | rejectattr('value', 'in', python_version_list) | map(attribute='key') | list }}"
