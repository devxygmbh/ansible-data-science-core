# to be able to install R-core
# epel-release is only available on AlmaLinux/Rocky/CentOS, not on RHEL
- name: Ensure EPEL is installed (AlmaLinux/Rocky/CentOS)
  when: ansible_facts['distribution'] != 'RedHat'
  ansible.builtin.dnf:
    name: epel-release
    state: present

# for flexiblas-devel
# On RHEL, CodeReady Builder is enabled via subscription-manager, not dnf config-manager
- name: Enable crb/powertools repository (AlmaLinux/Rocky/CentOS)
  when:
    - ansible_facts['distribution'] != 'RedHat'
    - ansible_facts['distribution_major_version'] | int in [8, 9]
  community.general.dnf_config_manager:
    name: "{{ 'crb' if ansible_facts['distribution_major_version'] | int == 9 else 'powertools' }}"
    state: enabled

- name: Install build dependencies for R
  ansible.builtin.dnf:
    update_cache: true
    name:
      - gcc-c++
      - automake
      - libtool
      - autoconf
      - zlib-devel
      - ncurses-devel
      - libX11-devel
      - readline-devel
      - libpng-devel
      - libjpeg-turbo-devel
      - cairo-devel
      - pango-devel
      - libcurl-devel
      - bzip2-devel
      - libzstd-devel
      - libtiff-devel
      - pcre2-devel
      - gcc-gfortran
      - libSM-devel
      - libXt-devel
      - libXmu-devel
      - texlive-collection-latexrecommended
      - texlive-upquote
      - "{{ 'java-21-openjdk-devel' if ansible_facts['distribution_major_version'] | int >= 9 else 'java-11-openjdk-devel' }}"
      - xz-devel
      - libicu-devel
      - tcl-devel
      - libICE-devel
      - texinfo-tex
      - "{{ 'flexiblas-devel' if ansible_facts['distribution_major_version'] | int >= 9 else 'openblas-devel' }}"
      - valgrind-devel
      - libtirpc-devel
      - tk-devel
      - less
      - libdeflate-devel
    state: present

- name: Check if R installation directory is empty
  ansible.builtin.find:
    paths: '/opt/R'
    file_type: directory
    patterns: "[0-9]\\.[0-9]\\.[0-9]"
  register: any_r_installed

- name: Install R via binary
  when: r_interpreter_install_binary | bool
  block:
    - name: List all installed R versions
      when: r_remove_unused_r_versions | bool and any_r_installed.matched | int != 0
      changed_when: false
      ansible.builtin.shell: dnf list installed | grep R-[0-9] | awk -F- '{print $2}' | awk -F. '{print $1"."$2"."$3}'
      register: r_installed_list

    - name: Set variable r_installed_list if no R versions are installed
      when: r_remove_unused_r_versions | bool and not any_r_installed.matched
      ansible.builtin.set_fact:
        r_installed_list: { stdout_lines: [] }

    - name: Create diff between lists
      when: any_r_installed.matched | int != 0
      ansible.builtin.set_fact:
        unwanted_r_versions: '{{ r_installed_list.stdout_lines | difference(r_interpreter_versions) }}'

    - name: Remove deprecated/old R versions
      when: r_remove_unused_r_versions | bool and any_r_installed.matched | int != 0
      ansible.builtin.dnf:
        name: "R-{{ item }}.{{ ansible_facts['architecture'] }}"
        state: absent
      loop: '{{ unwanted_r_versions }}'

    - name: Set Posit OS identifier for download
      ansible.builtin.set_fact:
        posit_os_identifier: "{{ 'centos' if ansible_facts['distribution_major_version'] | int == 8 else 'rhel' }}"

    - name: Download R binary from Artifactory (arm64)
      when:
        - dsc_artifactory_enabled | default(false)
        - ansible_facts['architecture'] == 'aarch64'
        - not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.get_url:
        url: '{{ dsc_artifactory_base_url }}/{{ dsc_artifactory_r_repo }}/R-{{ item }}-1-1.aarch64.rpm'
        dest: '/tmp/R-{{ item }}.rpm'
        url_username: '{{ dsc_artifactory_username }}'
        url_password: '{{ dsc_artifactory_password }}'
        force_basic_auth: true
        timeout: '{{ dsc_artifactory_timeout }}'
        mode: '0644'
      loop: '{{ r_interpreter_versions }}'

    - name: Download R binary (arm64)
      when:
        - not (dsc_artifactory_enabled | default(false))
        - ansible_facts['architecture'] == 'aarch64'
        - not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.get_url:
        url: "https://fsn1.your-objectstorage.com/devxy-r-builds/el{{ ansible_facts['distribution_major_version'] }}/R-{{ item }}-1-1.aarch64.rpm"
        dest: '/tmp/R-{{ item }}.rpm'
        force: true
        mode: '0644'
      loop: '{{ r_interpreter_versions }}'

    - name: Download R binary from Artifactory (x86_64)
      when:
        - dsc_artifactory_enabled | default(false)
        - ansible_facts['architecture'] == 'x86_64'
        - not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.get_url:
        url: '{{ dsc_artifactory_base_url }}/{{ dsc_artifactory_r_repo }}/R-{{ item }}-1-1.x86_64.rpm'
        dest: '/tmp/R-{{ item }}.rpm'
        url_username: '{{ dsc_artifactory_username }}'
        url_password: '{{ dsc_artifactory_password }}'
        force_basic_auth: true
        timeout: '{{ dsc_artifactory_timeout }}'
        mode: '0644'
      loop: '{{ r_interpreter_versions }}'

    - name: Download R binary (x86_64)
      when:
        - not (dsc_artifactory_enabled | default(false))
        - ansible_facts['architecture'] == 'x86_64'
        - not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.get_url:
        url: "https://cdn.posit.co/r/{{ posit_os_identifier }}-{{ ansible_facts['distribution_major_version'] }}/pkgs/R-{{ item }}-1-1.x86_64.rpm"
        dest: '/tmp/R-{{ item }}.rpm'
        mode: '0644'
      loop: '{{ r_interpreter_versions }}'

    - name: Uninstall existing R binaries
      when: not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.dnf:
        name: 'r-{{ item }}'
        state: absent
      loop: '{{ r_interpreter_versions }}'

    - name: Install R binary
      when: not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.dnf:
        name: '/tmp/R-{{ item }}.rpm'
        state: present
        disable_gpg_check: true
      loop: '{{ r_interpreter_versions }}'

    - name: Cleanup downloaded assets
      when: not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.file:
        path: '/tmp/R-{{ item }}.rpm'
        state: absent
      loop: '{{ r_interpreter_versions }}'

- name: Install ccache for source build
  when: r_source_build_use_ccache | bool
  ansible.builtin.dnf:
    name: ccache
    state: present

- name: Install R from tarball
  when: not r_interpreter_install_binary | bool
  block:
    - name: List all installed R versions
      ansible.builtin.shell: ls /opt/R | grep "[0-9]\\.[0-9]\\.[0-9]"
      register: r_installed_list

    - name: Set variable r_installed_list if no R versions are installed
      when: r_remove_unused_r_versions | bool and not any_r_installed.matched
      ansible.builtin.set_fact:
        r_installed_list: { stdout_lines: [] }

    - name: Create diff between lists
      when: any_r_installed.matched | int != 0
      ansible.builtin.set_fact:
        unwanted_r_versions: '{{ r_installed_list.stdout_lines | difference(r_interpreter_versions) }}'

    - name: Ensure required system dependencies are installed
      when: 'item not in ansible_facts.packages'
      ansible.builtin.dnf:
        name: '{{ item }}'
        state: present
      loop:
        - cmake
        - xorg-x11-server-devel
        - libXt-devel
        - tk-devel
        - gcc
        - gcc-c++

    # RHEL doesn't have the inconsolata font, so override the defaults.
    # This may be removed if RHEL ever adds the texlive-inconsolata package from Fedora.
    # Or check `dnf provides '*/inconsolata.sty'` for a package that provides it.
    # https://cran.r-project.org/doc/manuals/r-release/R-admin.html#Making-the-manuals
    - name: Install R binary
      when: not (item in r_installed.results | selectattr('stat.exists') | map(attribute='item') | list)
      ansible.builtin.shell: |
        export R_RD4PDF="times,hyper"
        export PATH="/usr/lib64/ccache:$PATH"
        cd "{{ r_interpreter_source_path }}"
        tar -xzf "R-{{ item }}.tar.gz"
        cd "R-{{ item }}"
        ./configure --prefix="/opt/R/{{ item }}/" --enable-R-shlib --with-tcltk --enable-memory-profiling --with-x --with-system-valgrind-headers --with-tcl-config=/usr/lib64/tclConfig.sh --with-tk-config=/usr/lib64/tkConfig.sh --enable-prebuilt-html
        make -j 4 -O
        make install
        cd ..
        rm -rf "R-{{ item }}.tar.gz" "R-{{ item }}"
      loop: '{{ r_interpreter_versions }}'

- name: Configure /etc/Rprofile.site (default)
  when:
    - r_custom_repos is undefined
    - r_configure_default_cran_repo
  ansible.builtin.blockinfile:
    create: true
    path: /etc/Rprofile.site
    mode: '0644'
    block: |
      # devxy.data_science_core.r
      options(install.packages.check.source = "no",
        repos = structure(c(CRAN = 'https://p3m.dev/cran/__linux__/{{ posit_os_identifier }}{{ ansible_facts['distribution_major_version'] }}/latest')))
