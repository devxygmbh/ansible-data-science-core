- name: Make sure R installation directory exists
  ansible.builtin.file:
    path: '/opt/R'
    state: directory
    mode: '0755'

- name: List installed R versions
  ansible.builtin.stat:
    path: '/opt/R/{{ item }}/bin/R'
  loop: '{{ r_interpreter_versions }}'
  register: r_installed

- name: Execute RedHat tasks
  when: ansible_facts['os_family'] == 'RedHat'
  ansible.builtin.import_tasks: redhat.yaml

- name: Execute Ubuntu tasks
  when: ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.import_tasks: ubuntu.yaml

# javareconf writes etc/javaconf, etc/Makeconf, and etc/ldpaths so rJava
# can compile and so the R shell wrapper exports LD_LIBRARY_PATH at launch.
# umask is forced so the rewritten files stay world-readable regardless of
# the sudo session's default.
- name: Configure R for Java (rJava)
  ansible.builtin.shell: 'umask 0022 && /opt/R/{{ item }}/bin/R CMD javareconf'
  loop: '{{ r_interpreter_versions }}'
  changed_when: false

# etc/ldpaths is only sourced by R's shell wrapper. Embedded R hosts like
# Positron's ark kernel dlopen libR.so directly and skip the wrapper, so
# libjvm.so ends up unreachable. Mirror the LD_LIBRARY_PATH export into
# each R version's etc/Renviron (processed by libR during init) so the JVM
# path is in scope regardless of how R was launched. The path is read out
# of that R version's own etc/javaconf to keep per-version JDK selection
# working if it's ever diverged.
- name: Read JAVA_LD_LIBRARY_PATH per R version
  ansible.builtin.shell: |
    set -e
    . /opt/R/{{ item }}/lib/R/etc/javaconf
    printf '%s\n' "${JAVA_LD_LIBRARY_PATH}"
  loop: '{{ r_interpreter_versions }}'
  register: r_java_ld_paths
  changed_when: false

- name: Expose libjvm.so to embedded R via Renviron
  when: item.stdout | length > 0
  ansible.builtin.blockinfile:
    path: '/opt/R/{{ item.item }}/lib/R/etc/Renviron'
    marker: '# {mark} ANSIBLE MANAGED BLOCK (rJava)'
    block: |
      LD_LIBRARY_PATH={{ item.stdout }}:${LD_LIBRARY_PATH}
  loop: '{{ r_java_ld_paths.results }}'
  loop_control:
    label: '{{ item.item }}'

# Belt-and-suspenders: register libjvm.so with the dynamic linker cache so
# it resolves even when LD_LIBRARY_PATH is clobbered by an embedding host
# (e.g. Positron/ark sets LD_LIBRARY_PATH=~autodetect, which leaks into
# subprocesses spawned by install.packages() and breaks rJava's JNI test).
- name: Register libjvm.so with the dynamic linker cache
  when: jvm_lib_paths | length > 0
  vars:
    jvm_lib_paths: "{{ r_java_ld_paths.results | map(attribute='stdout') | reject('equalto', '') | unique | list }}"
  ansible.builtin.copy:
    dest: /etc/ld.so.conf.d/openjdk-jvm.conf
    mode: '0644'
    content: "{{ jvm_lib_paths | join('\n') }}\n"
  notify: Run ldconfig

- name: Configure ccache in Makevars.site
  when: r_source_build_use_ccache | bool
  ansible.builtin.copy:
    dest: '/opt/R/{{ item }}/lib/R/etc/Makevars.site'
    mode: '0644'
    content: |
      CC=ccache gcc
      CXX=ccache g++
      CXX11=ccache g++
      CXX14=ccache g++
      CXX17=ccache g++
      CXX20=ccache g++
      FC=ccache gfortran
      F77=ccache gfortran
  loop: '{{ r_interpreter_versions }}'

- name: Remove ccache Makevars.site when disabled
  when: not (r_source_build_use_ccache | bool)
  ansible.builtin.file:
    path: '/opt/R/{{ item }}/lib/R/etc/Makevars.site'
    state: absent
  loop: '{{ r_interpreter_versions }}'

- name: Create ccache cache directory
  when: r_source_build_use_ccache | bool
  ansible.builtin.file:
    path: '{{ r_ccache_dir }}'
    state: directory
    mode: '1777'

- name: Configure ccache cache directory
  when: r_source_build_use_ccache | bool
  ansible.builtin.copy:
    dest: /etc/ccache.conf
    mode: '0644'
    content: |
      max_size = 30.0G
      cache_dir = {{ r_ccache_dir }}
      hash_dir = false
      sloppiness = include_file_ctime,include_file_mtime,time_macros,file_macro,locale
      umask = 000

- name: Remove ccache config when disabled
  when: not (r_source_build_use_ccache | bool)
  ansible.builtin.file:
    path: /etc/ccache.conf
    state: absent

- name: Create Renviron and Rprofile
  ansible.builtin.blockinfile:
    path: '/opt/R/{{ item }}/lib/R/etc/Renviron'
    block: |
      R_ENVIRON='/etc/Renviron.site'
      R_PROFILE='/etc/Rprofile.site'
      QUARTO_R=/opt/R/{{ item }}/lib/R/bin/R
    marker: '# {mark} ANSIBLE MANAGED BLOCK'
  loop: '{{ r_interpreter_versions }}'

- name: Configure R-version specific Renviron
  ansible.builtin.blockinfile:
    path: '/opt/R/{{ item }}/lib/R/etc/Renviron'
    block: |
      R_ENVIRON='/etc/Renviron.site'
      R_PROFILE='/etc/Rprofile.site'
      QUARTO_R=/opt/R/{{ item }}/lib/R/bin/R
    marker: '# {mark} ANSIBLE MANAGED BLOCK'
  loop: '{{ r_interpreter_versions }}'

- name: Configure profile.d for bash (R)
  ansible.builtin.copy:
    dest: /etc/profile.d/r.sh
    mode: '0755'
    content: |
      export PATH={% for ver in r_interpreter_versions | reverse %}/opt/R/{{ ver }}/bin{% if not loop.last %}:{% endif %}{% endfor %}:$PATH

- name: Ensure fish config directory exists
  ansible.builtin.file:
    path: /etc/fish/conf.d
    state: directory
    mode: '0755'

- name: Configure profile.d for fish (R)
  ansible.builtin.copy:
    dest: /etc/fish/conf.d/r.fish
    mode: '0755'
    content: |
      fish_add_path{% for ver in r_interpreter_versions | reverse %} '/opt/R/{{ ver }}/bin'{% endfor %}

- name: Configure /etc/Rprofile.site (custom repos)
  when:
    - r_custom_repos is defined
    - r_configure_default_cran_repo
  ansible.builtin.blockinfile:
    mode: '0644'
    create: true
    path: /etc/Rprofile.site
    block: |
      # devxy.data_science_core.r
      options(install.packages.check.source = "no",
        repos = structure(c({{ r_custom_repos }})))

- name: Define additional R options
  when: r_additional_options is defined
  ansible.builtin.blockinfile:
    path: /etc/Rprofile.site
    block: |
      {{ r_additional_options }}
